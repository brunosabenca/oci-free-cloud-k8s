apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-addons
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/fluxcd-addons
  prune: true
  dependsOn:
    - name: external-secrets
    - name: kube-prometheus-stack
    - name: envoy-gateway-config
  sourceRef:
    kind: GitRepository
    name: flux-system
