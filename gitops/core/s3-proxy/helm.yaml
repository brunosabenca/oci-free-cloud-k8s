apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: s3-proxy
spec:
  interval: 5m
  url: https://oxyno-zeta.github.io/helm-charts-v2/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: s3-proxy
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: s3-proxy
      version: "2.25.0"
      sourceRef:
        kind: HelmRepository
        name: s3-proxy
      interval: 5m
  releaseName: s3-proxy
  values:
    envFrom:
      - secretRef:
          name: s3-proxy-credentials
      - secretRef:
          name: s3-proxy-dex-client
    image:
      repository: docker.io/oxynozeta/s3-proxy
    ingress:
      enabled: false
    prometheus:
      serviceMonitor:
        enabled: true
    configFiles:
      config.yaml:
        log:
          format: text
          level: info
        metrics:
          disableRouterPath: false
        authProviders:
          oidc:
            dex:
              clientID: s3-proxy
              clientSecret:
                env: S3_PROXY_DEX_CLIENT_SECRET
              issuerUrl: https://login.brunosabenca.com/dex/
              redirectUrl: https://s3.brunosabenca.com/
              scopes:
                - openid
                - profile
                - groups
              groupClaim: groups
        targets:
          oracle:
            bucket:
              name: media
              region: uk-london-1
              s3Endpoint: https://lray0fqv9epr.compat.objectstorage.uk-london-1.oci.customer-oci.com
              credentials:
                accessKey:
                  env: AWS_ACCESS_KEY_ID
                secretKey:
                  env: AWS_SECRET_KEY_ID
            mount:
              path:
                - /
            resources:
              - path: "/*"
                methods:
                  - GET
                  - PUT
                  - DELETE
                provider: dex
                oidc:
                  authorizationAccesses:
                    - group: brunosabenca
