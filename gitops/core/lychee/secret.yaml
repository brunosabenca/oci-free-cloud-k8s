apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lychee-app-key
  namespace: lychee
spec:
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oracle-vault
  target:
    name: lychee-app-key
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        app-key: "{{ .appKey }}"
  data:
    - secretKey: appKey
      remoteRef:
        key: lychee-app-key
        version: CURRENT
        decodingStrategy: None
