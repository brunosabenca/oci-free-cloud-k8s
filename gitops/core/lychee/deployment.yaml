apiVersion: apps/v1
kind: Deployment
metadata:
  name: lychee
  labels:
    app.kubernetes.io/name: lychee
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lychee
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lychee
    spec:
      containers:
        - name: lychee
          image: docker.io/lycheeorg/lychee:v7.5.4
          env:
            - name: PHP_TZ
              value: Europe/Berlin
            - name: APP_URL
              value: "https://img.brunosabenca.com"
            - name: APP_FORCE_HTTPS
              value: "true"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: DB_CONNECTION
              value: sqlite
            - name: DB_DATABASE
              value: /conf/db.sqlite
            - name: PHP_UPLOAD_MAX_FILESIZE
              value: 100M
            - name: PHP_POST_MAX_SIZE
              value: 100M
            - name: TRUSTED_PROXIES
              value: "*"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: lychee-app-key
                  key: app-key
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: lychee-photos
              mountPath: /uploads
            - name: lychee-config
              mountPath: /conf
            - name: lychee-sym
              mountPath: /sym
      securityContext:
        fsGroup: 1000
      volumes:
        - name: lychee-photos
          persistentVolumeClaim:
            claimName: lychee-photos
        - name: lychee-config
          persistentVolumeClaim:
            claimName: lychee-config
        - name: lychee-sym
          persistentVolumeClaim:
            claimName: lychee-sym
